[package]
name = "cadmus-server"
version = "0.1.0"
edition = "2021"
license = "MIT"

[dependencies]
# Web framework (must match yrs-axum's axum dependency)
axum = { version = "0.8", features = ["ws"] }
tokio = { version = "1", features = ["full"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Yrs (Yjs Rust port) — must use 0.18 to match yrs-axum 0.8
yrs = "0.18"
yrs-axum = "0.8"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Auth
jsonwebtoken = "9"
argon2 = "0.5"
rand = "0.8"
sha2 = "0.10"
hex = "0.4"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "uuid", "chrono", "migrate"] }

# AWS
aws-sdk-s3 = "1"
aws-config = "1"

# Utilities
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
dashmap = "6"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest = { version = "0.12", features = ["json"] }
similar = "2"
thiserror = "1"
futures-util = "0.3"

[dev-dependencies]
tokio-tungstenite = { version = "0.26", features = ["native-tls"] }
futures-util = "0.3"
